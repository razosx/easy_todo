name: Flutter CI

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2.14.0
      - run: flutter pub get
      - run: flutter analyze 
      - run: dart format --set-exit-if-changed .
      - run: flutter test
